<div class="stage-column">
    @if(!showCombat) {
    <app-panel>
        <div class="stage-row">
            <app-button text="Stage: {{ stage.level }}" (clickEvent)="onNextStage()"></app-button>
        </div>
    </app-panel>

    }@else {
    <app-combat-panel [character]="character!" (closeCombat)="onCloseCombat()"></app-combat-panel>
    }
</div>
