<app-panel>
    <strong>Spells</strong>

    @if ( character && character.spells ) {
    <div class="spells-grid">
        @for (spell of character.spells; track spell.id) {
        <app-spell [spell]="spell" (spellClick)="onSpellClicked($event)">
        </app-spell>
        }
    </div>
    }
    @else {
    <p>No spells available.</p>
    }
</app-panel>
