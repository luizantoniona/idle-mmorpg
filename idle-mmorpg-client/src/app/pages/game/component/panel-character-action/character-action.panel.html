<app-panel>
    @if(character && character.action){
    @for(action of character.action.availableActions; track action.type){
    <app-button text="{{action.description}}" (clickEvent)="onActionClicked(action.type)"></app-button>
    }

    @if(character.action.currentAction){
    <strong>character.action.currentAction.description</strong>
    <app-bar [label]="character.action.currentAction.description" [value]="character.action.counter"
        [max]="character.action.duration" color="#2196f3"></app-bar>
    }
    }
    @else {
    <app-loading></app-loading>
    }
</app-panel>
